            document.getElementById('summary').style.display = 'block';

            document.getElementById('totalQ').innerText = questionBank.length;
            document.getElementById('finalCorrect').innerText = correctCount;

            document.getElementById('finalScore').innerText = percentage + "%";

                behavior: 'smooth'
            });

            </div>
        `;

            optionsDiv.className = 'options';

            item.options.forEach((opt, i) => {

                const btn = document.createElement('button');
                btn.innerText = opt;

                btn.onclick = function () {

                    if (optionsDiv.classList.contains('disabled')) return;

                    optionsDiv.classList.add('disabled');

                    const buttons = optionsDiv.querySelectorAll('button');

                    if (i === item.a) {

                        btn.classList.add('correct');
                        correctCount++;

                    } else {

                        btn.classList.add('wrong');
                        buttons[item.a].classList.add('correct');

                        wrongCount++;
                    }

                    answered++;
                    updateStats();
                };

                optionsDiv.appendChild(btn);
            });
